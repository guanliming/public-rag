# RAG 测试项目 - 非敏感配置文件
# 此文件包含非敏感配置，可以提交到 git
# 敏感配置（包括数据库连接信息）请放在 .env 文件中

# ============================================
# 嵌入模型配置
# ============================================
embedding:
  model_type: dashscope
  model_name: tongyi-embedding-vision-flash-2026-03-06
  device: cpu

# ============================================
# 文档切片配置
# ============================================
document:
  chunk_size: 1000
  chunk_overlap: 200

# ============================================
# LLM 配置
# ============================================
llm:
  model: qwen3.6-35b-a3b
  temperature: 0.7
  max_tokens: 4096
  top_p: 0.9
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

# ============================================
# RAG 检索配置
# ============================================
retrieval:
  k: 5

# ============================================
# Flask 配置
# ============================================
flask:
  host: 0.0.0.0
  port: 5000
  debug: true

# ============================================
# 文件上传配置
# ============================================
upload:
  folder: uploads
  max_content_length: 104857600
