<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档上传 - RAG 测试项目</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: #eef2ff;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-text h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .upload-text p {
            color: #666;
            margin-bottom: 5px;
        }

        .supported-formats {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .supported-formats h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .format-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .format-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn {
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .selected-file {
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }

        .selected-file.show {
            display: block;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-icon {
            font-size: 2rem;
        }

        .file-details h4 {
            color: #2e7d32;
            margin-bottom: 5px;
        }

        .file-details p {
            color: #666;
            font-size: 0.9rem;
        }

        .progress-container {
            margin-top: 30px;
            display: none;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-success {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 10px;
            padding: 20px;
        }

        .result-error {
            background: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            padding: 20px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .result-icon {
            font-size: 1.5rem;
        }

        .result-header h3 {
            font-size: 1.1rem;
        }

        .result-success h3 {
            color: #2e7d32;
        }

        .result-error h3 {
            color: #c62828;
        }

        .result-details {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .result-success .result-details {
            color: #2e7d32;
        }

        .result-error .result-details {
            color: #c62828;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 首页</a>
                <a href="/upload" class="nav-link active">📤 上传文档</a>
                <a href="/search" class="nav-link">🔍 搜索测试</a>
            </div>
            <h1>📤 上传文档</h1>
            <p>上传您的 PDF、Markdown 或纯文本文档</p>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">
                    <h2>拖拽文件到此处</h2>
                    <p>或者点击选择文件</p>
                </div>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,.md,.markdown,.txt">
            </div>

            <div class="selected-file" id="selectedFile">
                <div class="file-info">
                    <div class="file-icon" id="fileIcon">📄</div>
                    <div class="file-details">
                        <h4 id="fileName">文件名.pdf</h4>
                        <p id="fileSize">文件大小: 0 KB</p>
                    </div>
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">准备上传...</p>
            </div>

            <div class="result-container" id="resultContainer">
                <div id="resultContent"></div>
            </div>

            <div class="upload-btn">
                <button class="btn btn-primary" id="uploadBtn" disabled>
                    🚀 开始上传处理
                </button>
            </div>

            <div class="supported-formats">
                <h3>✅ 支持的文件格式</h3>
                <div class="format-list">
                    <span class="format-badge">📄 PDF (.pdf)</span>
                    <span class="format-badge">📝 Markdown (.md, .markdown)</span>
                    <span class="format-badge">📃 纯文本 (.txt)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素引用
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectedFile = document.getElementById('selectedFile');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileIcon = document.getElementById('fileIcon');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');

        // 当前选中的文件
        let currentFile = null;

        // 文件图标映射
        const iconMap = {
            'pdf': '📕',
            'md': '📝',
            'markdown': '📝',
            'txt': '📃'
        };

        // 拖拽事件处理
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        // 文件选择事件处理
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // 处理文件选择
        function handleFileSelect(file) {
            currentFile = file;

            // 显示文件信息
            const ext = file.name.split('.').pop().toLowerCase();
            const icon = iconMap[ext] || '📄';
            const size = formatFileSize(file.size);

            fileIcon.textContent = icon;
            fileName.textContent = file.name;
            fileSize.textContent = `文件大小: ${size}`;

            selectedFile.classList.add('show');
            uploadBtn.disabled = false;

            // 隐藏之前的结果
            resultContainer.classList.remove('show');
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 上传按钮点击事件
        uploadBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // 显示进度条
            progressContainer.classList.add('show');
            uploadBtn.disabled = true;

            // 隐藏之前的结果
            resultContainer.classList.remove('show');

            try {
                // 创建 FormData
                const formData = new FormData();
                formData.append('file', currentFile);

                // 发送请求
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                    // 模拟进度更新
                    onUploadProgress: (progressEvent) => {
                        if (progressEvent.lengthComputable) {
                            const percent = Math.round((progressEvent.loaded / progressEvent.total) * 100);
                            updateProgress(percent, '上传文件中...');
                        }
                    }
                });

                // 模拟进度（实际 XMLHttpRequest 需要不同处理）
                updateProgress(30, '上传文件中...');
                await delay(500);

                updateProgress(60, '解析文档中...');
                await delay(800);

                updateProgress(80, '向量化存储中...');
                await delay(600);

                updateProgress(100, '处理完成!');
                await delay(300);

                // 解析响应
                const result = await response.json();

                if (result.success) {
                    showSuccessResult(result);
                } else {
                    showErrorResult(result.message || '上传失败');
                }

            } catch (error) {
                console.error('上传错误:', error);
                showErrorResult(error.message || '网络错误');
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // 更新进度
        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }

        // 显示成功结果
        function showSuccessResult(result) {
            const data = result.data;
            const stats = data.stats || {};
            const vectorStats = data.vector_stats || {};
            const summary = data.summary || {};

            function formatNumber(num) {
                if (num === undefined || num === null) return '0';
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            let statsHtml = `
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value">${formatNumber(summary.text_total_chars || stats.total_chars || 0)}</div>
                        <div class="stat-label">📄 文本总量（字符）</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${summary.text_chunk_count || stats.total_count || 0}</div>
                        <div class="stat-label">📊 文本片段</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${summary.vector_stored_count || vectorStats.stored_count || 0}</div>
                        <div class="stat-label">🗄️ 向量数据库记录</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${vectorStats.verification_success ? '✅' : '⏳'}</div>
                        <div class="stat-label">${vectorStats.verification_success ? '已验证' : '处理中'}</div>
                    </div>
                </div>
            `;

            resultContent.innerHTML = `
                <div class="result-success">
                    <div class="result-header">
                        <span class="result-icon">✅</span>
                        <h3>文档上传成功!</h3>
                    </div>
                    <div class="result-details">
                        <p><strong>文件名:</strong> ${data.original_name}</p>
                        <p><strong>片段数量:</strong> ${data.total_chunks}</p>
                    </div>
                    ${statsHtml}
                    <p style="margin-top: 15px; font-weight: 600;">
                        🎉 文档已成功向量化并存储到数据库！
                        <a href="/chat" style="color: #667eea; text-decoration: underline;">去对话测试 →</a>
                    </p>
                </div>
            `;

            resultContainer.classList.add('show');
        }

        // 显示错误结果
        function showErrorResult(message) {
            resultContent.innerHTML = `
                <div class="result-error">
                    <div class="result-header">
                        <span class="result-icon">❌</span>
                        <h3>上传失败</h3>
                    </div>
                    <div class="result-details">
                        <p>${message}</p>
                    </div>
                </div>
            `;

            resultContainer.classList.add('show');
        }

        // 延迟函数
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
