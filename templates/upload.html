<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档上传 - RAG 测试项目</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: #eef2ff;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-text h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .upload-text p {
            color: #666;
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #999;
            margin-top: 10px;
        }

        .supported-formats {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .supported-formats h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .format-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .format-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn {
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .selected-files {
            margin-top: 20px;
            display: none;
        }

        .selected-files.show {
            display: block;
        }

        .selected-files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .selected-files-header h4 {
            color: #333;
            font-size: 1rem;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .clear-btn:hover {
            background: #ffebee;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .file-item.success {
            border-left-color: #28a745;
            background: #e8f5e9;
        }

        .file-item.error {
            border-left-color: #dc3545;
            background: #ffebee;
        }

        .file-item.processing {
            border-left-color: #ffc107;
            background: #fff3cd;
        }

        .file-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-details {
            font-size: 0.8rem;
            color: #666;
            margin-top: 2px;
        }

        .file-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .file-status.pending {
            background: #e9ecef;
            color: #666;
        }

        .file-status.success {
            background: #d4edda;
            color: #155724;
        }

        .file-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .file-status.processing {
            background: #fff3cd;
            color: #856404;
        }

        .file-remove-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            line-height: 1;
        }

        .file-remove-btn:hover {
            color: #dc3545;
        }

        .progress-container {
            margin-top: 30px;
            display: none;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-success {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 10px;
            padding: 20px;
        }

        .result-error {
            background: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            padding: 20px;
        }

        .result-partial {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 20px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .result-icon {
            font-size: 1.5rem;
        }

        .result-header h3 {
            font-size: 1.1rem;
        }

        .result-success h3 {
            color: #2e7d32;
        }

        .result-error h3 {
            color: #c62828;
        }

        .result-partial h3 {
            color: #856404;
        }

        .result-details {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .result-success .result-details {
            color: #2e7d32;
        }

        .result-error .result-details {
            color: #c62828;
        }

        .result-partial .result-details {
            color: #856404;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .kb-summary {
            margin-top: 15px;
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .kb-files-list {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .kb-file-tag {
            background: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 首页</a>
                <a href="/upload" class="nav-link active">📤 上传文档</a>
                <a href="/search" class="nav-link">🔍 搜索测试</a>
            </div>
            <h1>📤 上传文档</h1>
            <p>上传您的 PDF、Markdown 或纯文本文档（支持多文件）</p>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">
                    <h2>拖拽文件到此处</h2>
                    <p>或者点击选择文件</p>
                </div>
                <p class="upload-hint">💡 支持一次性选择多个文件上传</p>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,.md,.markdown,.txt" multiple>
            </div>

            <div class="selected-files" id="selectedFiles">
                <div class="selected-files-header">
                    <h4>📋 已选择的文件 (<span id="fileCount">0</span>)</h4>
                    <button class="clear-btn" id="clearBtn">清空所有</button>
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">准备上传...</p>
            </div>

            <div class="result-container" id="resultContainer">
                <div id="resultContent"></div>
            </div>

            <div class="upload-btn">
                <button class="btn btn-primary" id="uploadBtn" disabled>
                    🚀 开始上传处理
                </button>
            </div>

            <div class="supported-formats">
                <h3>✅ 支持的文件格式</h3>
                <div class="format-list">
                    <span class="format-badge">📕 PDF (.pdf)</span>
                    <span class="format-badge">📝 Markdown (.md, .markdown)</span>
                    <span class="format-badge">📃 纯文本 (.txt)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectedFiles = document.getElementById('selectedFiles');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const clearBtn = document.getElementById('clearBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');

        let currentFiles = [];

        const iconMap = {
            'pdf': '📕',
            'md': '📝',
            'markdown': '📝',
            'txt': '📃'
        };

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                addFiles(Array.from(files));
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                addFiles(Array.from(e.target.files));
            }
        });

        clearBtn.addEventListener('click', () => {
            currentFiles = [];
            updateFileList();
            fileInput.value = '';
        });

        function addFiles(files) {
            const validExtensions = ['pdf', 'md', 'markdown', 'txt'];
            
            for (const file of files) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (!validExtensions.includes(ext)) {
                    console.warn(`跳过不支持的文件: ${file.name}`);
                    continue;
                }
                
                const exists = currentFiles.some(f => f.name === file.name);
                if (!exists) {
                    currentFiles.push(file);
                }
            }
            
            updateFileList();
        }

        function removeFile(index) {
            currentFiles.splice(index, 1);
            updateFileList();
        }

        function updateFileList() {
            fileCount.textContent = currentFiles.length;
            
            if (currentFiles.length === 0) {
                selectedFiles.classList.remove('show');
                uploadBtn.disabled = true;
                return;
            }

            selectedFiles.classList.add('show');
            uploadBtn.disabled = false;

            fileList.innerHTML = currentFiles.map((file, index) => {
                const ext = file.name.split('.').pop().toLowerCase();
                const icon = iconMap[ext] || '📄';
                const size = formatFileSize(file.size);

                return `
                    <div class="file-item" data-index="${index}" id="fileItem${index}">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-details">大小: ${size}</div>
                        </div>
                        <span class="file-status pending" id="fileStatus${index}">等待上传</span>
                        <button class="file-remove-btn" onclick="removeFile(${index})" title="移除">×</button>
                    </div>
                `;
            }).join('');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        uploadBtn.addEventListener('click', async () => {
            if (currentFiles.length === 0) return;

            uploadBtn.disabled = true;
            progressContainer.classList.add('show');
            resultContainer.classList.remove('show');

            try {
                updateProgress(10, '准备上传...');
                await delay(300);

                const formData = new FormData();
                currentFiles.forEach(file => {
                    formData.append('file', file);
                });

                updateProgress(30, '上传文件中...');
                
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                updateProgress(80, '处理完成...');
                await delay(200);

                updateProgress(100, '处理完成!');
                await delay(200);

                const result = await response.json();

                if (result.data && result.data.files) {
                    result.data.files.forEach((fileInfo) => {
                        const fileIndex = currentFiles.findIndex(f => f.name === fileInfo.original_name);
                        if (fileIndex !== -1) {
                            const fileItem = document.getElementById(`fileItem${fileIndex}`);
                            const fileStatus = document.getElementById(`fileStatus${fileIndex}`);
                            if (fileItem) {
                                fileItem.classList.add('success');
                            }
                            if (fileStatus) {
                                fileStatus.className = 'file-status success';
                                const overwriteText = fileInfo.is_overwrite ? ' (覆盖更新)' : ' (新增)';
                                fileStatus.textContent = `成功${overwriteText}`;
                            }
                        }
                    });
                }

                if (result.data && result.data.errors) {
                    result.data.errors.forEach((errorInfo) => {
                        const fileIndex = currentFiles.findIndex(f => f.name === errorInfo.file_name);
                        if (fileIndex !== -1) {
                            const fileItem = document.getElementById(`fileItem${fileIndex}`);
                            const fileStatus = document.getElementById(`fileStatus${fileIndex}`);
                            if (fileItem) {
                                fileItem.classList.add('error');
                            }
                            if (fileStatus) {
                                fileStatus.className = 'file-status error';
                                fileStatus.textContent = '失败';
                            }
                        }
                    });
                }

                showResult(result);

            } catch (error) {
                console.error('上传错误:', error);
                showErrorResult(error.message || '网络错误');
            } finally {
                uploadBtn.disabled = false;
                fileInput.value = '';
            }
        });

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }

        function showResult(result) {
            const data = result.data || {};
            const successCount = data.success_files || 0;
            const failedCount = data.failed_files || 0;
            const totalCount = data.total_files || 0;

            let resultClass = 'result-success';
            let resultIcon = '✅';
            let resultTitle = '上传成功！';

            if (successCount === 0 && failedCount > 0) {
                resultClass = 'result-error';
                resultIcon = '❌';
                resultTitle = '上传失败';
            } else if (successCount > 0 && failedCount > 0) {
                resultClass = 'result-partial';
                resultIcon = '⚠️';
                resultTitle = '部分上传成功';
            }

            const kbSummary = data.knowledge_base_summary || {};
            const kbFiles = kbSummary.files_in_kb || [];

            let kbHtml = '';
            if (kbFiles.length > 0) {
                kbHtml = `
                    <div class="kb-summary">
                        <div style="font-weight: bold; margin-bottom: 8px;">📚 知识库当前状态</div>
                        <div style="margin-bottom: 8px;">
                            共 <strong>${kbSummary.total_files_in_kb}</strong> 个文件，
                            <strong>${kbSummary.total_chunks_in_kb}</strong> 条向量记录
                        </div>
                        <div class="kb-files-list">
                            ${kbFiles.map(f => `<span class="kb-file-tag">${f.file_name}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            resultContent.innerHTML = `
                <div class="${resultClass}">
                    <div class="result-header">
                        <span class="result-icon">${resultIcon}</span>
                        <h3>${resultTitle}</h3>
                    </div>
                    <div class="result-details">
                        <p>成功: <strong>${successCount}</strong> 个文件</p>
                        ${failedCount > 0 ? `<p>失败: <strong>${failedCount}</strong> 个文件</p>` : ''}
                    </div>
                    ${kbHtml}
                    <p style="margin-top: 15px; font-weight: 600;">
                        🎉 文档已成功向量化并存储到知识库！
                        <a href="/chat" style="color: #667eea; text-decoration: underline;">去对话测试 →</a>
                    </p>
                </div>
            `;

            resultContainer.classList.add('show');
        }

        function showErrorResult(message) {
            resultContent.innerHTML = `
                <div class="result-error">
                    <div class="result-header">
                        <span class="result-icon">❌</span>
                        <h3>上传失败</h3>
                    </div>
                    <div class="result-details">
                        <p>${message}</p>
                    </div>
                </div>
            `;

            resultContainer.classList.add('show');
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
