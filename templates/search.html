<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索测试 - RAG 测试项目</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 20px;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .search-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-input-group {
            display: flex;
            gap: 15px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .form-row-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label {
            color: #666;
            font-size: 0.9rem;
        }

        .form-select {
            padding: 8px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
        }

        .form-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.4);
        }

        .btn-success:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-outline {
            background: white;
            border: 2px solid #e0e0e0;
            color: #666;
            padding: 10px 18px;
            font-size: 0.85rem;
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .mode-hint {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 10px;
        }

        .mode-hint p {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .mode-hint p strong {
            color: #333;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            margin-bottom: 0;
            font-size: 1.2rem;
        }

        .result-count {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .result-rank {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .result-header-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .result-score {
            margin-left: auto;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fff3e0;
            color: #e65100;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .score-badge.high {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .score-badge.medium {
            background: #fff3e0;
            color: #e65100;
        }

        .score-badge.low {
            background: #ffebee;
            color: #c62828;
        }

        .result-content {
            color: #333;
            line-height: 1.7;
            font-size: 0.95rem;
            margin-bottom: 15px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .result-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meta-badge {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #666;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .meta-badge strong {
            color: #333;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .no-results h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #666;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box p {
            color: #1565c0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .info-box p strong {
            color: #0d47a1;
        }

        .quick-questions {
            margin-top: 15px;
        }

        .quick-questions h4 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-tag {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-tag:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .chat-section {
            margin-top: 30px;
            display: none;
        }

        .chat-section.show {
            display: block;
        }

        .chat-answer-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 16px;
            padding: 25px;
            border-left: 4px solid #28a745;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .chat-answer-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .chat-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .chat-source-badge {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .chat-source-badge.reference {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .chat-source-badge.builtin {
            background: rgba(255, 193, 7, 0.1);
            color: #d39e00;
        }

        .chat-source-badge.unknown {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
        }

        .chat-answer-content {
            color: #333;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .chat-answer-content p {
            margin-bottom: 12px;
        }

        .chat-answer-content p:last-child {
            margin-bottom: 0;
        }

        .chat-answer-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .chat-answer-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .chat-answer-content pre code {
            background: none;
            padding: 0;
        }

        .chat-answer-content ul,
        .chat-answer-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }

        .chat-answer-content li {
            margin: 5px 0;
        }

        .chat-answer-content strong {
            color: #333;
        }

        .retrieved-contexts-toggle {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .toggle-btn:hover {
            color: #764ba2;
        }

        .retrieved-contexts {
            display: none;
            margin-top: 15px;
        }

        .retrieved-contexts.show {
            display: block;
        }

        .context-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .context-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .context-item-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
        }

        .context-item-score {
            font-size: 0.75rem;
            color: #666;
        }

        .context-item-content {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.6;
            max-height: 100px;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 20px 20px 0 0;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border-bottom: none;
        }

        .tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 首页</a>
                <a href="/upload" class="nav-link">📤 上传文档</a>
                <a href="/search" class="nav-link active">🔍 搜索测试</a>
                <a href="/chat" class="nav-link">💬 对话模式</a>
            </div>
            <h1>🔍 RAG 搜索与问答</h1>
            <p>基于向量相似度的语义检索 + 百炼大模型智能问答</p>
        </div>

        <div class="card">
            <div class="search-section">
                <h2>📝 输入查询</h2>

                <div class="info-box">
                    <p>
                        <strong>💡 提示：</strong>
                        您有两种模式可选：<br>
                        • <strong>🔍 搜索</strong>：仅执行向量相似度检索，显示相关文档片段<br>
                        • <strong>💬 问答</strong>：先检索相关文档，再调用百炼大模型生成回答
                    </p>
                </div>

                <form class="search-form" id="searchForm">
                    <div class="search-input-group">
                        <input
                            type="text"
                            class="search-input"
                            id="queryInput"
                            placeholder="输入您的问题或关键词，例如：什么是机器学习？"
                            required
                        >
                        <div class="button-group">
                            <button type="button" class="btn btn-primary" id="searchBtn">
                                🔍 搜索
                            </button>
                            <button type="button" class="btn btn-success" id="chatBtn">
                                💬 问答
                            </button>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-row-left">
                            <div class="form-group">
                                <label>返回结果数量:</label>
                                <select class="form-select" id="kSelect">
                                    <option value="3">3 条</option>
                                    <option value="5" selected>5 条</option>
                                    <option value="10">10 条</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="quick-questions">
                        <h4>💡 快速示例（如果您已上传文档）：</h4>
                        <div class="quick-tags">
                            <span class="quick-tag" data-query="什么是机器学习？">什么是机器学习？</span>
                            <span class="quick-tag" data-query="人工智能的应用">人工智能的应用</span>
                            <span class="quick-tag" data-query="向量数据库是什么">向量数据库是什么</span>
                            <span class="quick-tag" data-query="深度学习">深度学习</span>
                        </div>
                    </div>
                </form>
            </div>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p id="loadingText">正在处理...</p>
            </div>

            <div class="tabs" id="resultTabs" style="display: none;">
                <button class="tab active" data-tab="search">🔍 检索结果</button>
                <button class="tab" data-tab="chat">💬 模型回答</button>
            </div>

            <div class="tab-content active" id="searchTabContent">
                <div class="results-section" id="searchResultsSection">
                    <div class="results-header">
                        <h2>📋 检索结果</h2>
                        <span class="result-count" id="searchResultCount">找到 0 条结果</span>
                    </div>

                    <div class="result-list" id="searchResultList">
                    </div>
                </div>
            </div>

            <div class="tab-content" id="chatTabContent">
                <div class="chat-section" id="chatSection">
                </div>
            </div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const kSelect = document.getElementById('kSelect');
        const searchBtn = document.getElementById('searchBtn');
        const chatBtn = document.getElementById('chatBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingText = document.getElementById('loadingText');
        const searchResultsSection = document.getElementById('searchResultsSection');
        const searchResultList = document.getElementById('searchResultList');
        const searchResultCount = document.getElementById('searchResultCount');
        const quickTags = document.querySelectorAll('.quick-tag');
        const resultTabs = document.getElementById('resultTabs');
        const searchTabContent = document.getElementById('searchTabContent');
        const chatTabContent = document.getElementById('chatTabContent');
        const chatSection = document.getElementById('chatSection');

        let currentSearchData = null;
        let currentChatData = null;

        quickTags.forEach(tag => {
            tag.addEventListener('click', () => {
                const query = tag.getAttribute('data-query');
                queryInput.value = query;
                queryInput.focus();
            });
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                tab.classList.add('active');
                const tabName = tab.getAttribute('data-tab');
                if (tabName === 'search') {
                    searchTabContent.classList.add('active');
                } else {
                    chatTabContent.classList.add('active');
                }
            });
        });

        searchBtn.addEventListener('click', async () => {
            await performSearch();
        });

        chatBtn.addEventListener('click', async () => {
            await performChat();
        });

        queryInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                await performSearch();
            }
        });

        async function performSearch() {
            const query = queryInput.value.trim();
            if (!query) return;

            const k = parseInt(kSelect.value);

            showLoading('正在检索相关文档...');
            searchResultsSection.classList.remove('show');
            chatSection.classList.remove('show');
            resultTabs.style.display = 'none';
            setButtonsDisabled(true);

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        k: k
                    })
                });

                const result = await response.json();
                currentSearchData = result.data;

                if (result.success) {
                    displaySearchResults(result.data);
                } else {
                    displaySearchError(result.message || '搜索失败');
                }

            } catch (error) {
                console.error('搜索错误:', error);
                displaySearchError(error.message || '网络错误');
            } finally {
                hideLoading();
                setButtonsDisabled(false);
            }
        }

        async function performChat() {
            const query = queryInput.value.trim();
            if (!query) return;

            const k = parseInt(kSelect.value);

            showLoading('正在检索文档并调用大模型...');
            setButtonsDisabled(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        k: k
                    })
                });

                const result = await response.json();
                currentChatData = result.data;

                if (result.success) {
                    if (result.data.retrieved_contexts && result.data.retrieved_contexts.length > 0) {
                        displaySearchResults({
                            query: query,
                            result_count: result.data.retrieved_contexts.length,
                            results: result.data.retrieved_contexts
                        });
                    }

                    displayChatAnswer(result.data);

                    resultTabs.style.display = 'flex';
                    document.querySelector('[data-tab="chat"]').classList.add('active');
                    document.querySelector('[data-tab="search"]').classList.remove('active');
                    chatTabContent.classList.add('active');
                    searchTabContent.classList.remove('active');
                } else {
                    displayChatError(result.message || '问答失败');
                }

            } catch (error) {
                console.error('问答错误:', error);
                displayChatError(error.message || '网络错误');
            } finally {
                hideLoading();
                setButtonsDisabled(false);
            }
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loadingIndicator.classList.add('show');
        }

        function hideLoading() {
            loadingIndicator.classList.remove('show');
        }

        function setButtonsDisabled(disabled) {
            searchBtn.disabled = disabled;
            chatBtn.disabled = disabled;
        }

        function displaySearchResults(data) {
            const results = data.results || [];

            searchResultCount.textContent = `找到 ${results.length} 条结果`;
            searchResultList.innerHTML = '';

            if (results.length === 0) {
                searchResultList.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3>没有找到相关文档</h3>
                        <p>可能的原因：</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            1. 还没有上传任何文档<br>
                            2. 查询内容与已上传文档不相关<br>
                            3. 尝试使用不同的关键词或表达方式
                        </p>
                        <p style="margin-top: 15px;">
                            <a href="/upload" style="color: #667eea; text-decoration: underline;">
                                先去上传文档 →
                            </a>
                        </p>
                    </div>
                `;
            } else {
                results.forEach((result, index) => {
                    const card = createResultCard(result, index + 1);
                    searchResultList.appendChild(card);
                });
            }

            searchResultsSection.classList.add('show');
        }

        function createResultCard(result, rank) {
            const card = document.createElement('div');
            card.className = 'result-card';

            const score = result.score;
            let scoreClass = 'low';
            if (score >= 0.7) scoreClass = 'high';
            else if (score >= 0.4) scoreClass = 'medium';

            const metadata = result.metadata || {};
            const metaBadges = [];

            if (metadata.file_name) {
                metaBadges.push(`<span class="meta-badge">📄 <strong>${escapeHtml(metadata.file_name)}</strong></span>`);
            }
            if (metadata.format) {
                metaBadges.push(`<span class="meta-badge">📁 ${escapeHtml(metadata.format)}</span>`);
            }
            if (metadata.chunk_index !== undefined) {
                metaBadges.push(`<span class="meta-badge">📊 第 ${metadata.chunk_index + 1}/${metadata.total_chunks || '?'} 段</span>`);
            }

            card.innerHTML = `
                <div class="result-header-row">
                    <div class="result-rank">${rank}</div>
                    <div class="result-score">
                        <span class="score-badge ${scoreClass}">
                            🎯 相似度: ${(score * 100).toFixed(1)}%
                        </span>
                    </div>
                </div>
                <div class="result-content">
                    ${escapeHtml(result.content)}
                </div>
                <div class="result-meta">
                    ${metaBadges.join('')}
                </div>
            `;

            return card;
        }

        function displaySearchError(message) {
            searchResultCount.textContent = '搜索出错';
            searchResultList.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">❌</div>
                    <h3>搜索出错</h3>
                    <p style="color: #c62828;">${escapeHtml(message)}</p>
                    <p style="margin-top: 15px; font-size: 0.9rem;">
                        请检查：<br>
                        1. 数据库服务是否运行<br>
                        2. pgvector 扩展是否已安装<br>
                        3. 向量存储是否已初始化
                    </p>
                </div>
            `;
            searchResultsSection.classList.add('show');
        }

        function displayChatAnswer(data) {
            const answer = data.answer || '';
            const sourceType = data.source_type || '未知';
            const retrievedContexts = data.retrieved_contexts || [];

            let sourceBadgeClass = 'unknown';
            let sourceBadgeText = '来源: 未知';

            if (sourceType === '参考资料') {
                sourceBadgeClass = 'reference';
                sourceBadgeText = '来源: 参考资料';
            } else if (sourceType === '大模型内置知识') {
                sourceBadgeClass = 'builtin';
                sourceBadgeText = '来源: 大模型内置知识';
            }

            let contextsHtml = '';
            if (retrievedContexts.length > 0) {
                contextsHtml = retrievedContexts.map((ctx, index) => {
                    const score = ctx.score ? `${(ctx.score * 100).toFixed(1)}%` : '-';
                    const metadata = ctx.metadata || {};
                    const fileName = metadata.file_name || `文档${index + 1}`;
                    return `
                        <div class="context-item">
                            <div class="context-item-header">
                                <span class="context-item-title">📄 ${escapeHtml(fileName)} - 第 ${index + 1} 段</span>
                                <span class="context-item-score">相似度: ${score}</span>
                            </div>
                            <div class="context-item-content">
                                ${escapeHtml(ctx.content)}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            chatSection.innerHTML = `
                <div class="chat-answer-box">
                    <div class="chat-answer-header">
                        <div class="chat-avatar">🤖</div>
                        <span class="chat-title">百炼大模型回答</span>
                        <span class="chat-source-badge ${sourceBadgeClass}">
                            ${sourceBadgeText}
                        </span>
                    </div>
                    <div class="chat-answer-content">
                        ${formatMarkdown(answer)}
                    </div>
                    ${retrievedContexts.length > 0 ? `
                    <div class="retrieved-contexts-toggle">
                        <button class="toggle-btn" onclick="toggleContexts()">
                            <span id="toggleIcon">▼</span>
                            <span id="toggleText">查看检索到的参考资料 (${retrievedContexts.length} 段)</span>
                        </button>
                        <div class="retrieved-contexts" id="retrievedContexts">
                            ${contextsHtml}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            chatSection.classList.add('show');
        }

        function displayChatError(message) {
            chatSection.innerHTML = `
                <div class="chat-answer-box" style="border-left-color: #dc3545;">
                    <div class="chat-answer-header">
                        <div class="chat-avatar" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">⚠️</div>
                        <span class="chat-title">问答出错</span>
                    </div>
                    <div class="chat-answer-content">
                        <p style="color: #c62828;">${escapeHtml(message)}</p>
                        <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">
                            请检查：<br>
                            1. 是否已上传文档<br>
                            2. DASHSCOPE_API_KEY 是否配置正确<br>
                            3. 网络连接是否正常
                        </p>
                    </div>
                </div>
            `;
            chatSection.classList.add('show');
        }

        function toggleContexts() {
            const contextsDiv = document.getElementById('retrievedContexts');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleText = document.getElementById('toggleText');

            if (contextsDiv.classList.contains('show')) {
                contextsDiv.classList.remove('show');
                toggleIcon.textContent = '▼';
                toggleText.textContent = toggleText.textContent.replace('收起', '查看');
            } else {
                contextsDiv.classList.add('show');
                toggleIcon.textContent = '▲';
                toggleText.textContent = toggleText.textContent.replace('查看', '收起');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMarkdown(text) {
            let result = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.*$)/gim, '<h3 style="font-size: 1.1rem; margin: 15px 0 10px; color: #333;">$1</h3>')
                .replace(/^## (.*$)/gim, '<h2 style="font-size: 1.2rem; margin: 15px 0 10px; color: #333;">$1</h2>')
                .replace(/^# (.*$)/gim, '<h1 style="font-size: 1.3rem; margin: 15px 0 10px; color: #333;">$1</h1>');

            result = result.replace(/```([\s\S]*?)```/g, (match, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            result = result.replace(/^- (.*$)/gim, '<li>$1</li>');
            result = result.replace(/(\n<li>.*<\/li>)+/g, (match) => {
                return `<ul style="margin: 10px 0; padding-left: 20px;">${match}</ul>`;
            });

            result = result.replace(/\n\n/g, '</p><p>');
            result = result.replace(/\n/g, '<br>');

            if (!result.startsWith('<')) {
                result = '<p>' + result + '</p>';
            }

            return result;
        }

        queryInput.focus();
    </script>
</body>
</html>
